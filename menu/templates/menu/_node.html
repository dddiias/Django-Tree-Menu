<li class="{% if node.is_active %}active{% endif %}">
    {% if node.href %}
    <a href="{{ node.href }}">{{ node.title }}</a>
    {% else %}
    <span>{{ node.title }}</span>
    {% endif %}

    {% if node.children %}
    {% if node.is_open or node.is_active %}
    <ul class="open">
        {% for child in node.children %}
        {% include "menu/_node.html" with node=child only %}
        {% endfor %}
    </ul>
    {% endif %}
    {% endif %}
</li>
