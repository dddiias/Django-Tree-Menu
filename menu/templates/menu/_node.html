<li class="{% if node.is_active %}active{% endif %}">
    {% if node.named_url %}
    <a href="{% url node.named_url %}">{{ node.title }}</a>
    {% else %}
    <a href="{{ node.url }}">{{ node.title }}</a>
    {% endif %}

    {% if node.children and node.is_open %}
    <ul>
        {% for child in node.children %}
        {% include "menu/_node.html" with node=child %}
        {% endfor %}
    </ul>
    {% endif %}
</li>
